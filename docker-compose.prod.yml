# Production stack for the Raspberry Pi (Phase 6, OP-3/OP-4).
#
# Postgres + Express API + nginx-served SPA. The client is published on
# 127.0.0.1:8081 only; the Pi's existing native cloudflared (hackpi-tunnel)
# forwards trivyy.com -> http://localhost:8081, so no router ports open (OP-4).
#
# Usage on the Pi (see docs/runbook.md):
#   cp .env.example .env   # then fill real values (SESSION_SECRET, ADMIN hash, TUNNEL_TOKEN)
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml run --rm server npm run migrate
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trivyy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-trivyy}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-trivyy}']
      interval: 5s
      timeout: 5s
      retries: 10
    # No published ports — only the `server` service reaches the DB on the
    # internal compose network.

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-trivyy}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-trivyy}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:?set ADMIN_PASSWORD_HASH in .env}
      # The browser origin is the public domain (TLS terminates at Cloudflare).
      CLIENT_ORIGIN: https://${APP_DOMAIN:?set APP_DOMAIN in .env}
    depends_on:
      db:
        condition: service_healthy
    # No published ports — reached only by nginx (client) on the compose network.

  client:
    build:
      context: .
      dockerfile: client/Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - server
    # Loopback-only publish; the Pi's native cloudflared (hackpi-tunnel) forwards
    # trivyy.com -> http://localhost:8081 to this container (OP-4).
    ports:
      - '127.0.0.1:8081:8080'

volumes:
  db_data:
