# Production web server for the Trivyy SPA (Phase 6 deploy).
#
# Serves the built static assets and reverse-proxies /api to the Express server
# so the SPA and API share one origin (keeps the session cookie first-party,
# SEC-3). TLS is terminated at the Cloudflare edge; the Tunnel forwards plain
# HTTP to this container, so we do not configure certs here (OP-4, SEC-7).

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 8080;
  server_name _;

  # gzip the text assets the SPA ships.
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  root /usr/share/nginx/html;
  index index.html;

  # --- Security headers ---------------------------------------------------
  # Content-Security-Policy: pure 'self' — fonts are now self-hosted (bundled
  # via @fontsource), so no external origins are needed (spec §9). 'unsafe-inline'
  # for styles covers the token-driven inline styles in the React components.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # --- API reverse proxy --------------------------------------------------
  # `server` is the service name on the compose network.
  location /api/ {
    proxy_pass http://server:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Cloudflare -> cloudflared -> nginx -> server are all HTTP; the original
    # scheme is https at the edge. Tell the API so its secure cookie is correct.
    proxy_set_header X-Forwarded-Proto https;
    # Cloudflare edge headers for admin analytics: real client IP + ISO country
    # (the app stores these for the dashboard only — never logged, SEC-6).
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    proxy_set_header CF-IPCountry $http_cf_ipcountry;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  # --- SPA fallback -------------------------------------------------------
  # Cache fingerprinted assets hard; never cache the HTML shell.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-cache" always;
    try_files $uri /index.html;
  }
}
