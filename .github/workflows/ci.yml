name: CI

# Runs on every pull request to main (CI-1) plus pushes to main.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least-privilege default (CI-5).
permissions:
  contents: read

jobs:
  quality:
    name: Lint, typecheck, test, secret scan
    runs-on: ubuntu-latest
    steps:
      # actions pinned to commit SHAs (CI-5)
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # full history so the secret scan can diff

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # All gates are blocking — no continue-on-error (CI-2, CI-6).
      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage (server)
        run: npm test

      - name: Client unit tests (Vitest + RTL)
        run: npm run test --workspace client

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  integration:
    name: Integration tests (DB)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trivyy
          POSTGRES_PASSWORD: trivyy
          POSTGRES_DB: trivyy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trivyy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://trivyy:trivyy@localhost:5432/trivyy
      SESSION_SECRET: ci-session-secret-ci-session
      ADMIN_PASSWORD_HASH: ci-unused-hash-placeholder
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # Apply migrations, then run the supertest integration suite against the
      # live Postgres service (API-4). Blocking gate (CI-2).
      - name: Migrate
        run: npm run migrate

      - name: Integration tests
        run: npm run test:integration --workspace server

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trivyy
          POSTGRES_PASSWORD: trivyy
          POSTGRES_DB: trivyy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trivyy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Full-stack run: the server reads these; Playwright's webServer starts the
      # API + client preview (see e2e/playwright.config.ts).
      DATABASE_URL: postgres://trivyy:trivyy@localhost:5432/trivyy
      SESSION_SECRET: e2e-session-secret-e2e-session
      # Real argon2id hash of 'e2e-admin-password' — the admin-login E2E spec
      # signs in with that password, so the API must be able to verify it.
      ADMIN_PASSWORD_HASH: '$argon2id$v=19$m=65536,t=3,p=4$vqrdWtW1e5CnGoiu+PYzzQ$hsd8ePrkwwBrDGTJpZDIX4KAuB3YTNUGXKuhuwiNe5w'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Apply migrations, then insert the deterministic question fixture so the
      # solo flow has questions without calling the live OpenTDB API.
      - name: Migrate
        run: npm run migrate

      - name: Seed deterministic question fixture
        run: psql "$DATABASE_URL" -f server/tests/fixtures/questions.sql

      # Starts the API + client preview (playwright.config.ts webServer), then
      # runs the full-stack E2E suite. Blocking gate (TEST-4, CI-2).
      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: playwright-report
          path: |
            e2e/playwright-report
            e2e/test-results
          retention-days: 7

  db-migrate:
    name: DB migration (up/down)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trivyy
          POSTGRES_PASSWORD: trivyy
          POSTGRES_DB: trivyy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trivyy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://trivyy:trivyy@localhost:5432/trivyy
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # Validates every migration applies and rolls back cleanly (DB-2).
      - name: Migrate up
        run: npm run migrate
      - name: Migrate down (revert latest)
        run: npm run migrate:down
