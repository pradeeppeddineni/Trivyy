name: PR Review (8-layer)

# AI pull request review on every PR (CI-4). Reads the diff and posts an
# 8-layer review using the Anthropic API. The API key is a secret, never code.
on:
  pull_request:
    branches: [main]

# Least privilege: read code, write PR comments only (CI-5).
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Anthropic 8-layer review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20

      - name: Run review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/pr-review.mjs
